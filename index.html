 <!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple To-Do</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #6c63ff;
    }

    .todo-card {
      width: 350px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    #taskInput {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    #addTaskBtn {
      padding: 8px 12px;
      border: none;
      background: #6c63ff;
      color: white;
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
    }

    #addTaskBtn:hover {
      background: #574fd6;
    }

    #taskList {
      list-style: none;
    }

    #taskList li {
      background: #f2f2f2;
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .detele {
      border: none;
      background: red;
      color: white;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .detele:hover {
      background: darkred;
    }
  </style>
</head>

<body>
  <div class="todo-card">
    <h1>My Tasks</h1>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button id="addTaskBtn">+</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      let input = document.getElementById("taskInput");
      let btn = document.getElementById("addTaskBtn");
      let box = document.getElementById("taskList");

      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") btn.click();
      });

      let task = JSON.parse(localStorage.getItem("task")) || [];

      task.forEach((uid) => rendertask(uid));

      btn.addEventListener("click", () => {
        let tasks = input.value.trim();
        if (tasks === "") return;

        let uid = {
          id: Date.now(),
          text: tasks,
          completed: false,
        };

        task.push(uid);
        rendertask(uid);
        savedata();
        input.value = "";
      });

      function rendertask(uid) {
        let li = document.createElement("li");
        li.setAttribute("data-id", uid.id);

        li.innerHTML = `
          <span>${uid.text}</span>
          <button class="detele">delete</button>
        `;

        box.appendChild(li);

        li.querySelector(".detele").addEventListener("click", (e) => {
          e.stopPropagation();
          task = task.filter(t => t.id !== uid.id);
          li.remove();
          savedata();
        });
      }

      function savedata() {
        localStorage.setItem("task", JSON.stringify(task));
      }
    });
  </script>
</body>
</html>
